name: golangci-lint
on:
  push:
    branches:
      - master
      - main
  pull_request:
permissions:
  contents: read
jobs:
  slogseq:
    name: lint (slogseq)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: false
      - uses: golangci/golangci-lint-action@v9
        with:
          skip-cache: true
          version: latest
          args: --timeout=5m

  seqotel:
    name: lint (seqotel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'seqotel/go.mod'
          cache: false
      - uses: golangci/golangci-lint-action@v9
        with:
          skip-cache: true
          version: latest
          args: --timeout=5m
          working-directory: seqotel
